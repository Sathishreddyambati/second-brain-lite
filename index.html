<!DOCTYPE html>
<html>
<head>
  <title>Second Brain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🧠 Second Brain</h1>
  <p class="tagline">Never forget anything again</p>

  <!-- MIC BUTTON -->
  <div id="micCircle">🎤</div>
  <p id="status">Tap to record a memory</p>

  <!-- ASK -->
  <div class="ask-box">
    <input type="text" id="query" placeholder="Ask something...">
    <button onclick="searchMemory()">Ask</button>
  </div>

  <!-- RESULT -->
  <p id="result"></p>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
