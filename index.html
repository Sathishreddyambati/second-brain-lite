<!DOCTYPE html>
<html>
<head>
  <title>Second Brain Lite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🧠 Second Brain Lite</h1>

  <!-- MIC SAVE -->
  <button id="recordBtn" class="mic-btn">🎤 Tap to Remember</button>
  <p id="status"></p>
  <p id="textOutput"></p>

  <!-- ASK SECTION -->
  <div class="ask-box">
    <input type="text" id="query" placeholder="Ask your brain...">
    <button onclick="searchMemory()">Ask</button>
    <button id="askMicBtn">🎤</button>
  </div>

  <p id="result"></p>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module" src="app.js"></script>

</body>
</html>
